<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Learning Studio | Admin Analytics</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ------------------------------------------------
RESET
------------------------------------------------ */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* ------------------------------------------------
BODY
------------------------------------------------ */

body{

font-family:"Inter",sans-serif;

background:url("/static/css/bg2.webp") center/cover no-repeat fixed;

min-height:100vh;

padding:40px;

color:white;

}

/* overlay */

body::before{

content:"";

position:fixed;

inset:0;

background:rgba(0,0,0,.55);

z-index:-1;

}

/* ------------------------------------------------
HEADER
------------------------------------------------ */

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

}

.title{

font-size:30px;

font-weight:700;

}

/* ------------------------------------------------
BUTTON
------------------------------------------------ */

.back-btn{

padding:10px 18px;

border-radius:10px;

text-decoration:none;

color:white;

background:linear-gradient(
135deg,
#ff2d95,
#c026d3,
#7c3aed
);

font-weight:600;

}

/* ------------------------------------------------
GRID
------------------------------------------------ */

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:30px;

}

/* ------------------------------------------------
CARD
------------------------------------------------ */

.card{

background:rgba(255,255,255,.15);

backdrop-filter:blur(18px);

border-radius:20px;

padding:25px;

border:1px solid rgba(255,255,255,.2);

box-shadow:0 25px 60px rgba(0,0,0,.45);

}

/* ------------------------------------------------
CHART
------------------------------------------------ */

canvas{

width:100% !important;

height:300px !important;

}

/* ------------------------------------------------
STATS
------------------------------------------------ */

.stats{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

margin-bottom:30px;

}

.stat{

background:rgba(255,255,255,.15);

border-radius:16px;

padding:20px;

text-align:center;

backdrop-filter:blur(10px);

}

.stat h3{

font-size:14px;

opacity:.85;

margin-bottom:6px;

}

.stat p{

font-size:22px;

font-weight:700;

}

/* ------------------------------------------------
TIMER
------------------------------------------------ */

#timerBox{

position:fixed;

top:20px;
right:20px;

background:rgba(0,0,0,.6);

padding:10px 16px;

border-radius:10px;

font-weight:600;

backdrop-filter:blur(10px);

}

/* ------------------------------------------------
RESPONSIVE
------------------------------------------------ */

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.stats{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div id="timerBox">
⏱ <span id="timer">00:00</span>
</div>

<div class="header">

<div class="title">
Admin Analytics
</div>

<a href="/" class="back-btn">
Back to Dashboard
</a>

</div>

<div class="stats">

<div class="stat">
<h3>Total Users</h3>
<p id="totalUsers">0</p>
</div>

<div class="stat">
<h3>Total Downloads</h3>
<p id="totalDownloads">0</p>
</div>

<div class="stat">
<h3>Top File</h3>
<p id="topFile">-</p>
</div>

</div>

<div class="grid">

<div class="card">

<h3>Downloads Per User</h3>

<canvas id="userChart"></canvas>

</div>

<div class="card">

<h3>Downloads Per Day</h3>

<canvas id="dayChart"></canvas>

</div>

<div class="card">

<h3>Top Downloaded Files</h3>

<canvas id="fileChart"></canvas>

</div>

</div>

<script>

/* TIMER */

function updateTime(){

const now = new Date()

const options = {
timeZone: "Asia/Kolkata",
hour: "2-digit",
minute: "2-digit",
second: "2-digit",
hour12: false
}

document.getElementById("timer").innerText =
now.toLocaleTimeString("en-IN", options)

}

setInterval(updateTime,1000)

updateTime()
/* FETCH ANALYTICS */

fetch("/api/admin/analytics")
.then(r=>r.json())
.then(data=>{

/* stats */

document.getElementById("totalUsers").innerText =
data.downloads_user.labels.length

document.getElementById("totalDownloads").innerText =
data.downloads_day.values.reduce((a,b)=>a+b,0)

document.getElementById("topFile").innerText =
data.top_files.labels[0] || "-"

/* charts */

new Chart(document.getElementById("userChart"),{

type:"bar",

data:{
labels:data.downloads_user.labels,
datasets:[{
label:"Downloads",
data:data.downloads_user.values,
backgroundColor:"#7c3aed"
}]
}

})

new Chart(document.getElementById("dayChart"),{

type:"line",

data:{
labels:data.downloads_day.labels,
datasets:[{
label:"Downloads",
data:data.downloads_day.values,
borderColor:"#ff2d95",
fill:false
}]
}

})

new Chart(document.getElementById("fileChart"),{

type:"pie",

data:{
labels:data.top_files.labels,
datasets:[{
data:data.top_files.values,
backgroundColor:[
"#ff2d95",
"#c026d3",
"#7c3aed",
"#6366f1",
"#22c55e"
]
}]
}

})

})

</script>

</body>
</html>
